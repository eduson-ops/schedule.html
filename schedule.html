<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Расписание</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 16px; }
button { cursor: pointer; border: none; font-family: inherit; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 20px; font-weight: 800; color: #f8fafc; margin: 0; }
.sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.controls { display: flex; gap: 4px; }
.vbtn { padding: 5px 12px; border-radius: 7px; font-size: 11px; font-weight: 600; background: #1e293b; color: #94a3b8; transition: background .15s, color .15s; }
.vbtn.on { background: #3b82f6; color: #fff; }
.vbtn:focus-visible, .rbtn:focus-visible, .dbtn:focus-visible, .xbtn:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; }
.rbtn { padding: 5px 8px; border-radius: 7px; background: #1e293b; color: #94a3b8; font-size: 13px; }

.daybar { display: flex; gap: 5px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 2px; }
.dbtn { flex: 1 0 auto; min-width: 60px; padding: 8px 6px; border-radius: 10px; text-align: center; color: #cbd5e1; background: #1e293b; transition: all .15s; }
.dbtn .ds { font-size: 10px; font-weight: 700; opacity: .8; }
.dbtn .dn { font-size: 22px; font-weight: 900; line-height: 1; }

.fbar { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; padding: 6px 12px; background: #1e293b; border-radius: 8px; font-size: 12px; }
.ftag { padding: 2px 8px; border-radius: 5px; font-weight: 600; font-size: 12px; }
.xbtn { margin-left: auto; padding: 2px 8px; border-radius: 5px; background: #ef4444; color: #fff; font-size: 11px; font-weight: 700; }

.dblock { background: #1e293b; border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
.dbhead { padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
.dbtitle { font-size: 14px; font-weight: 800; }
.dbcnt { padding: 1px 7px; border-radius: 8px; font-size: 10px; font-weight: 700; color: #0f172a; }
.lrow { display: grid; grid-template-columns: 50px 1fr; align-items: center; padding: 7px 12px; gap: 8px; border-bottom: 1px solid #334155; cursor: pointer; transition: background .12s; }
.lrow:last-child { border-bottom: none; }
.lrow:hover { background: #253347; }
.ltime { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; }
.lname { font-size: 12px; font-weight: 600; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lmeta { font-size: 11px; color: #94a3b8; margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.dcard { background: #1e293b; border-radius: 12px; padding: 12px 16px; display: grid; grid-template-columns: 60px 1fr; gap: 12px; align-items: start; margin-bottom: 6px; border-left: 3px solid transparent; }
.dct { text-align: center; }
.dct .t { font-size: 22px; font-weight: 900; line-height: 1; }
.dct .tz { font-size: 10px; color: #475569; margin-top: 2px; }
.dcname { font-size: 14px; font-weight: 700; color: #f8fafc; }
.dccnt { font-size: 11px; color: #94a3b8; font-weight: 400; }
.tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
.tag { padding: 1px 7px; border-radius: 5px; font-size: 10px; font-weight: 600; }
.tg { background: #374151; color: #d1d5db; }
.tb { background: #1e3a5f; color: #93c5fd; }
.teacher { font-size: 11px; color: #94a3b8; margin-top: 5px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

.tblock { background: #1e293b; border-radius: 12px; overflow: hidden; border: 1px solid transparent; margin-bottom: 6px; }
.tblock.open { border-color: #3b82f6; }
.tbtn { width: 100%; padding: 12px 16px; background: transparent; color: #e2e8f0; text-align: left; display: flex; align-items: center; justify-content: space-between; transition: background .12s; }
.tbtn:hover { background: #253347; }
.tbtn:focus-visible { outline: 2px solid #60a5fa; outline-offset: -2px; }
.tname { font-size: 14px; font-weight: 700; }
.tsub { font-size: 11px; color: #94a3b8; margin-top: 1px; }
.tcnt { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #334155; font-size: 15px; font-weight: 900; color: #94a3b8; }
.tcnt.open { background: #3b82f6; color: #fff; }
.trows { padding: 0 16px 12px; }
.trow { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-top: 1px solid #334155; }
.trday { width: 26px; text-align: center; font-size: 10px; font-weight: 700; border-radius: 3px; padding: 1px 0; }
.trtime { font-size: 12px; font-weight: 700; width: 40px; font-variant-numeric: tabular-nums; }
.trchild { font-size: 11px; color: #e2e8f0; flex: 1; }
.trgroup { font-size: 10px; color: #64748b; }

.nbtn { background: none; border: none; cursor: pointer; color: inherit; font: inherit; font-weight: inherit; padding: 0; border-bottom: 1px dashed #475569; transition: all .15s; text-align: left; }
.nbtn:hover { border-bottom-color: #60a5fa; color: #93c5fd; }
.nbtn:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; border-radius: 2px; }

.cbtn { padding: 2px 8px; border-radius: 5px; background: #1e293b; color: #94a3b8; font-size: 10px; font-weight: 600; border: 1px solid #334155; cursor: pointer; transition: all .15s; white-space: nowrap; }
.cbtn:hover { background: #334155; color: #e2e8f0; }
.cbtn.ok { background: #16a34a20; color: #4ade80; border-color: #4ade8040; }

.stats { margin-top: 20px; padding: 12px 14px; background: #1e293b; border-radius: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 8px; text-align: center; }
.snum { font-size: 22px; font-weight: 900; }
.slbl { font-size: 11px; color: #64748b; }

.footer { text-align: center; font-size: 10px; color: #334155; margin-top: 8px; }
.hint { text-align: center; color: #64748b; padding: 32px; font-size: 13px; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
.spinner { width: 40px; height: 40px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: sp .8s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
.erbox { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 20px; }

/* ── POPUP ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.78); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 16px; }
.overlay.show { display: flex; }
.pcard { background: #1e293b; border-radius: 20px; width: 100%; max-width: 480px; border: 1px solid #2d3a4e; box-shadow: 0 24px 80px rgba(0,0,0,.6); overflow: hidden; max-height: 90vh; overflow-y: auto; }
.phead { padding: 20px 20px 16px; border-bottom: 1px solid #2d3748; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; background: #1a2234; position: sticky; top: 0; z-index: 1; }
.pchild { font-size: 22px; font-weight: 800; color: #f8fafc; margin-bottom: 6px; }
.ptags { display: flex; gap: 5px; flex-wrap: wrap; }
.pclose { width: 34px; height: 34px; border-radius: 9px; background: #2d3748; color: #718096; border: none; cursor: pointer; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; margin-top: 2px; }
.pclose:hover { background: #3d4a5c; color: #e2e8f0; }
.pclose:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; }
.psec { padding: 16px 20px; border-bottom: 1px solid #1e2d40; }
.psec:last-child { border-bottom: none; }
.pseclbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #4a5568; margin-bottom: 10px; }
.prow { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; line-height: 1.5; }
.prow:last-child { margin-bottom: 0; }
.pico { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; margin-top: 1px; }
.pval { flex: 1; }
.plink { color: #60a5fa; text-decoration: none; border-bottom: 1px dashed #3b82f640; }
.plink:hover { color: #93c5fd; border-bottom-color: #93c5fd; }
.pempty { color: #4a5568; font-size: 12px; font-style: italic; padding: 16px 20px; }
.ppay { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ppay .amount { font-weight: 700; color: #f8fafc; }
.ppay .meta { color: #64748b; font-size: 12px; }
</style>
</head>
<body>
<div id="app"></div>

<!-- POPUP -->
<div id="popup-overlay" class="overlay" onclick="if(event.target===this)hidePopup()" role="dialog" aria-modal="true" aria-labelledby="p-name">
  <div class="pcard">
    <div class="phead">
      <div>
        <div class="pchild" id="p-name"></div>
        <div class="ptags" id="p-tags"></div>
      </div>
      <button class="pclose" id="p-close" onclick="hidePopup()" aria-label="Закрыть">✕</button>
    </div>
    <div id="p-body"></div>
  </div>
</div>

<script>
const DAYS = ["Понедельник","Вторник","Среда","Четверг","Пятница","Суббота","Воскресенье"];
const DS = {Понедельник:"Пн",Вторник:"Вт",Среда:"Ср",Четверг:"Чт",Пятница:"Пт",Суббота:"Сб",Воскресенье:"Вс"};
const DC = {
  Понедельник:{a:"#60a5fa",b:"#1e3a5f80"},
  Вторник:    {a:"#4ade80",b:"#1a473180"},
  Среда:      {a:"#fbbf24",b:"#713f1280"},
  Четверг:    {a:"#fb923c",b:"#7c2d1280"},
  Пятница:    {a:"#a78bfa",b:"#4c1d9580"},
  Суббота:    {a:"#34d399",b:"#064e3b80"},
  Воскресенье:{a:"#f472b6",b:"#83184380"},
};
const PB = {
  Python: {bg:"#1e40af",c:"#dbeafe"},
  Scratch:{bg:"#b45309",c:"#fef3c7"},
};
const BASE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT25E4I1fZ4JTPFgPf6CmAUBP-AZugF_qgGTubKybfTSiZ8YiuszkTLAM_h5iFZ_8dk6NCZtZbKElbu/pub?gid=218134507&single=true&output=csv";
const PROXIES = [
  BASE,
  "https://corsproxy.io/?" + encodeURIComponent(BASE),
  "https://api.allorigins.win/raw?url=" + encodeURIComponent(BASE),
];
const DAY_MAP = {
  пн:"Понедельник",понедельник:"Понедельник",
  вт:"Вторник",вторник:"Вторник",
  ср:"Среда",среда:"Среда",
  чт:"Четверг",четверг:"Четверг",
  пт:"Пятница",пятница:"Пятница",
  сб:"Суббота",суббота:"Суббота",
  вс:"Воскресенье",вск:"Воскресенье",воскресенье:"Воскресенье",
};

const S = {entries:[], raw:[], loading:true, err:null, dbg:"", upd:null, selD:null, selT:null, view:"week"};

function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function parseSched(s) {
  if (!s) return [];
  const out = [];
  const re = /(Пн|Вт|Ср|Чт|Пт|Сб|Вс|Вск|понедельник|вторник|среда|четверг|пятница|суббота|воскресенье)[а-яА-Я]*\s*(\d{1,2})[:\.](\d{2})/gi;
  let m;
  while ((m = re.exec(s)) !== null) {
    out.push({day: DAY_MAP[m[1].toLowerCase()] || m[1], time: `${m[2]}:${m[3]}`});
  }
  if (!out.length) {
    let df = null;
    for (const k in DAY_MAP) if (s.toLowerCase().includes(k)) { df = DAY_MAP[k]; break; }
    const tm = s.match(/(\d{1,2})[:\.](\d{2})/);
    if (df && tm) out.push({day: df, time: `${tm[1]}:${tm[2]}`});
  }
  return out;
}

function fc(h, ...keys) {
  const hl = h.map(x => (x || "").toString().trim().toLowerCase());
  for (const k of keys) {
    const j = hl.findIndex(x => x.includes(k.toLowerCase()));
    if (j !== -1) return j;
  }
  return -1;
}

function proc(text) {
  const p = Papa.parse(text, {skipEmptyLines: true});
  const rows = p.data;
  if (!rows || rows.length < 2) return {entries: [], dbg: "Нет строк"};
  const hdr = rows[0].map(x => (x || "").trim());
  const iT    = fc(hdr,"Основной преподаватель","преподаватель");
  const iG    = fc(hdr,"Группа");
  const iS    = fc(hdr,"Время занятий");
  const iF    = fc(hdr,"Формат");
  const iP    = fc(hdr,"Продукт");
  const iPr   = fc(hdr,"Имя родителя");
  const iCh   = fc(hdr,"ФИО ребенка","Имя ребенка");
  const iCo   = fc(hdr,"Комментарий");
  const iZ    = fc(hdr,"Ссылка на занятия","Ссылка на занятие","Zoom","Ссылка на урок");
  const iA    = fc(hdr,"Ссылка на амо","Ссылка на AMO","AMO","Ссылка на сделку");
  const iVK   = fc(hdr,"Ссылка на группу","ВК","VK","Группа VK");
  const iAge  = fc(hdr,"Возраст","Дата рождения");
  const iPay  = fc(hdr,"Сумма оплаты","Оплата","Сумма");
  const iPayCnt  = fc(hdr,"Оплачено занятий","Кол-во уроков","Количество уроков","Оплачено уроков");
  const iPayDate = fc(hdr,"Дата УР","Дата оплаты","Дата платежа");
  const iPack = fc(hdr,"Пакет","Тариф","Тип пакета");
  const iTg   = fc(hdr,"Telegram","Тг","TG","Телеграм");
  const iEmail= fc(hdr,"Email","Почта","E-mail");
  const iPhone= fc(hdr,"Телефон","Phone","Номер телефона");
  const iPN   = fc(hdr,"ФИО родителя","Имя родителя","Родитель");

  const dbg = `${rows.length} строк | Преп=${iT>=0?"✓":"✗"} Группа=${iG>=0?"✓":"✗"} Расп=${iS>=0?"✓":"✗"} Ребёнок=${iCh>=0?"✓":"✗"}`;
  const entries = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    const child  = iCh >= 0 ? (r[iCh] || "").trim() : "";
    const parent = iPr >= 0 ? (r[iPr] || "").trim() : "";
    if (!child && !parent) continue;
    const com = (iCo >= 0 ? r[iCo] || "" : "").toUpperCase();
    if (com.includes("ОТЧИСЛЕН") || com.includes("ВОЗВРАТ")) continue;
    const sched   = iS >= 0 ? (r[iS] || "") : "";
    const group   = iG >= 0 ? (r[iG] || "") : "";
    const teacher = iT >= 0 ? (r[iT] || "Не назначен") : "Не назначен";
    const product = iP >= 0 ? (r[iP] || "") : "";
    const format  = iF >= 0 ? (r[iF] || "") : "";
    if (!sched || !group) continue;
    for (const dt of parseSched(sched)) {
      entries.push({
        day: dt.day, ds: DS[dt.day] || "?", time: dt.time,
        group: group.trim(), child: child || "—", parent,
        teacher: teacher || "Не назначен", product,
        format: format.includes("Индив") ? "Индив." : format.includes("Груп") ? "Группа" : format,
        zoom:     iZ    >= 0 ? (r[iZ]    || "") : "",
        amo:      iA    >= 0 ? (r[iA]    || "") : "",
        vk:       iVK   >= 0 ? (r[iVK]   || "") : "",
        age:      iAge  >= 0 ? (r[iAge]  || "") : "",
        pay:      iPay  >= 0 ? (r[iPay]  || "") : "",
        payCnt:   iPayCnt  >= 0 ? (r[iPayCnt]  || "") : "",
        payDate:  iPayDate >= 0 ? (r[iPayDate] || "") : "",
        pack:     iPack >= 0 ? (r[iPack] || "") : "",
        tg:       iTg   >= 0 ? (r[iTg]   || "") : "",
        email:    iEmail>= 0 ? (r[iEmail]|| "") : "",
        phone:    iPhone>= 0 ? (r[iPhone]|| "") : "",
        parentName: iPN >= 0 ? (r[iPN] || "") : parent,
      });
    }
  }
  entries.sort((a, b) => {
    const d = DAYS.indexOf(a.day) - DAYS.indexOf(b.day);
    if (d) return d;
    const [ah, am] = a.time.split(":").map(Number);
    const [bh, bm] = b.time.split(":").map(Number);
    return (ah * 60 + (am || 0)) - (bh * 60 + (bm || 0));
  });
  return {entries, dbg};
}

function dedup(entries) {
  const m = new Map(), r = [];
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    const k = `${e.day}|${e.time}|${e.group}`;
    if (m.has(k)) {
      const x = m.get(k);
      const n = e.child.split(" ")[0];
      if (!x.child.includes(n)) x.child += `, ${n}`;
      x.sc++;
    } else {
      const x = Object.assign({}, e, {child: e.child.split(" ")[0], sc: 1});
      m.set(k, x);
      r.push(x);
    }
  }
  r.forEach((e, i) => { e.idx = i; });
  return r;
}

/* ─── POPUP ─────────────────────────────────────────────────────────── */
function showPopup(idx) {
  const e = S.entries[idx];
  if (!e) return;

  document.getElementById("p-name").textContent = e.child;

  const tagsEl = document.getElementById("p-tags");
  tagsEl.innerHTML = "";
  if (e.product && PB[e.product]) {
    const sp = document.createElement("span");
    sp.className = "tag";
    sp.style.background = PB[e.product].bg;
    sp.style.color = PB[e.product].c;
    sp.textContent = e.product;
    tagsEl.appendChild(sp);
  }
  if (e.format) {
    const sp = document.createElement("span");
    sp.className = "tag tg";
    sp.textContent = e.format;
    tagsEl.appendChild(sp);
  }
  if (e.group) {
    const sp = document.createElement("span");
    sp.className = "tag tb";
    sp.textContent = e.group;
    tagsEl.appendChild(sp);
  }
  if (e.teacher && e.teacher !== "Не назначен") {
    const sp = document.createElement("span");
    sp.className = "tag";
    sp.style.background = "#1a2e1a";
    sp.style.color = "#4ade80";
    sp.textContent = `👩‍🏫 ${e.teacher}`;
    tagsEl.appendChild(sp);
  }

  const body = document.getElementById("p-body");
  body.innerHTML = "";

  let studH = "";
  if (e.amo)     studH += prow("🔗", `<a class="plink" href="${esc(e.amo)}" target="_blank" rel="noopener">Открыть в AMO CRM</a>`);
  if (e.age)     studH += prow("🎂", esc(e.age));
  if (e.pack)    studH += prow("📦", `<strong style="color:#f8fafc">${esc(e.pack)}</strong>`);
  if (e.payCnt) {
    let payH = `<span style="color:#f8fafc;font-weight:600">${esc(e.payCnt)} уроков</span>`;
    if (e.payDate) payH += ` <span class="meta">· оплачено ${esc(e.payDate)}</span>`;
    studH += prow("📚", `<div class="ppay">${payH}</div>`);
  }
  if (e.vk) studH += prow("💬", `<a class="plink" href="${esc(e.vk)}" target="_blank" rel="noopener">Группа ВКонтакте</a>`);
  if (studH) body.appendChild(makeSec("Ученик", studH));

  let parH = "";
  if (e.parentName) parH += prow("👤", esc(e.parentName));
  if (e.phone)      parH += prow("📞", esc(e.phone));
  if (e.tg)         parH += prow("✈️", esc(e.tg));
  if (e.email)      parH += prow("📧", esc(e.email));
  if (parH) body.appendChild(makeSec("Родитель", parH));

  if (!studH && !parH) {
    const d = document.createElement("div");
    d.className = "pempty";
    d.textContent = "Дополнительных данных нет";
    body.appendChild(d);
  }

  document.getElementById("popup-overlay").classList.add("show");
  document.getElementById("p-close").focus();
}

function prow(ico, html) {
  return `<div class="prow"><span class="pico">${ico}</span><span class="pval">${html}</span></div>`;
}

function makeSec(label, html) {
  const d = document.createElement("div");
  d.className = "psec";
  d.innerHTML = `<div class="pseclbl">${label}</div>${html}`;
  return d;
}

function hidePopup() {
  document.getElementById("popup-overlay").classList.remove("show");
}
document.addEventListener("keydown", e => { if (e.key === "Escape") hidePopup(); });

/* ─── COPY ─────────────────────────────────────────────────────────── */
function copyZoom(url, bid) {
  if (!url) return;
  const done = () => {
    const btn = document.getElementById(bid);
    if (btn) {
      btn.textContent = "✓ Скопировано";
      btn.classList.add("ok");
      setTimeout(() => { btn.textContent = "Zoom"; btn.classList.remove("ok"); }, 2000);
    }
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(done).catch(() => legacyCopy(url, done));
  } else {
    legacyCopy(url, done);
  }
}

function legacyCopy(url, done) {
  const t = document.createElement("textarea");
  t.value = url;
  t.style.cssText = "position:fixed;opacity:0";
  document.body.appendChild(t);
  t.select();
  document.execCommand("copy");
  document.body.removeChild(t);
  done();
}

/* ─── LOAD ─────────────────────────────────────────────────────────── */
async function load() {
  S.loading = true; S.err = null; render();
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy);
      if (!res.ok) continue;
      const text = await res.text();
      if (!text || text.length < 50) continue;
      const out = proc(text);
      if (out.entries.length > 0) {
        S.raw = out.entries;
        S.entries = dedup(out.entries);
        S.dbg = out.dbg;
        S.upd = new Date();
        S.err = null;
        S.loading = false;
        render();
        return;
      } else {
        S.dbg = out.dbg;
      }
    } catch (ex) { continue; }
  }
  S.err = "Не удалось загрузить. Убедись что таблица опубликована — лист «Реестр учеников»";
  S.loading = false;
  render();
}

/* ─── HELPERS ──────────────────────────────────────────────────────── */
function filtered() {
  let d = S.entries;
  if (S.selD) d = d.filter(e => e.day === S.selD);
  if (S.selT) d = d.filter(e => e.teacher === S.selT);
  return d;
}
function dSum() {
  return DAYS.map(d => ({d, s: DS[d], n: S.entries.filter(e => e.day === d).length}));
}
function teachers() {
  const m = {};
  S.entries.forEach(e => {
    if (!m[e.teacher]) m[e.teacher] = {t: e.teacher, n: 0, ds: new Set(), ent: []};
    m[e.teacher].n++;
    m[e.teacher].ds.add(e.ds);
    m[e.teacher].ent.push(e);
  });
  return Object.values(m).sort((a, b) => b.n - a.n);
}
function bdg(product) {
  if (!product || !PB[product]) return "";
  return `<span class="tag" style="background:${PB[product].bg};color:${PB[product].c}">${esc(product)}</span>`;
}

/* ─── RENDER ───────────────────────────────────────────────────────── */
function render() {
  const app = document.getElementById("app");

  if (S.loading && !S.entries.length) {
    app.innerHTML = `<div class="loading"><div class="spinner"></div><p style="margin-top:14px;color:#94a3b8;font-size:13px">Загрузка из Google Sheets...</p></div>`;
    return;
  }
  if (S.err && !S.entries.length) {
    app.innerHTML = `<div class="erbox"><div style="font-size:40px;margin-bottom:12px">⚠️</div><p style="color:#f87171;font-size:14px;max-width:420px">${esc(S.err)}</p><p style="color:#475569;font-size:10px;max-width:500px;margin-top:8px;word-break:break-all">${esc(S.dbg)}</p><button onclick="load()" style="margin-top:16px;padding:8px 24px;border-radius:8px;background:#3b82f6;color:#fff;font-weight:600">Повторить</button></div>`;
    return;
  }

  const filt = filtered(), ds = dSum(), tch = teachers();
  const total = S.entries.length;
  const grp   = new Set(S.entries.map(e => e.group)).size;
  const tc    = tch.filter(t => t.t !== "Не назначен").length;
  const stu   = S.raw.length;
  const upd   = S.upd ? S.upd.toLocaleTimeString("ru-RU", {hour:"2-digit", minute:"2-digit"}) : "—";

  let h = `<div class="header"><div><h1>📅 Расписание</h1><div class="sub">Live • ${upd}${S.loading ? ` <span style="color:#fbbf24">⟳</span>` : ""}</div></div><div class="controls">`;
  for (const [v, l] of [["week","Неделя"],["day","Дни"],["teacher","Препод."]]) {
    h += `<button class="vbtn${S.view === v ? " on" : ""}" onclick="setView('${v}')">${l}</button>`;
  }
  h += `<button class="rbtn" onclick="load()" aria-label="Обновить">🔄</button></div></div>`;

  h += `<div class="daybar">`;
  for (const {d, s, n} of ds) {
    const c = DC[d], sel = S.selD === d;
    h += `<button class="dbtn" onclick="toggleDay('${d}')" aria-pressed="${sel}" style="background:${sel ? c.a : "#1e293b"};color:${sel ? "#0f172a" : "#cbd5e1"};box-shadow:${sel ? `0 2px 12px ${c.a}40` : "none"}"><div class="ds">${s}</div><div class="dn">${n}</div></button>`;
  }
  h += `</div>`;

  if (S.selD || S.selT) {
    h += `<div class="fbar"><span style="color:#64748b">Фильтр:</span>`;
    if (S.selD) { const c = DC[S.selD]; h += `<span class="ftag" style="background:${c.a}30;color:${c.a}">${esc(S.selD)}</span>`; }
    if (S.selT) h += `<span class="ftag" style="background:#3b82f620;color:#60a5fa">${esc(S.selT)}</span>`;
    h += `<button class="xbtn" onclick="clearF()" aria-label="Сбросить фильтр">✕</button></div>`;
  }

  /* WEEK */
  if (S.view === "week") {
    if (!filt.length) {
      h += `<div class="hint">Нет занятий${S.selD ? " в этот день" : ""}</div>`;
    } else {
      for (const day of DAYS) {
        const ent = filt.filter(e => e.day === day);
        if (!ent.length) continue;
        const c = DC[day];
        h += `<div class="dblock" style="border-left:3px solid ${c.a}"><div class="dbhead" style="background:${c.b}"><span class="dbtitle" style="color:${c.a}">${day}</span><span class="dbcnt" style="background:${c.a}">${ent.length}</span></div>`;
        for (const e of ent) {
          h += `<div class="lrow" onclick="showPopup(${e.idx})">`;
          h += `<span class="ltime" style="color:${c.a}">${esc(e.time)}</span>`;
          h += `<div><div class="lname">${esc(e.child)}${e.sc > 1 ? `<span style="color:#64748b;font-weight:400"> (${e.sc})</span>` : ""}${bdg(e.product)}</div>`;
          h += `<div class="lmeta">${esc(e.group)} • ${esc(e.teacher)} • ${esc(e.format)}${e.zoom ? `<button class="cbtn" id="cw${e.idx}" onclick="event.stopPropagation();copyZoom('${e.zoom.replace(/'/g,"\\'")}','cw${e.idx}')">Zoom</button>` : ""}</div></div></div>`;
        }
        h += `</div>`;
      }
    }
  }

  /* DAY */
  if (S.view === "day") {
    if (!S.selD) {
      h += `<div class="hint">Выбери день выше ☝️</div>`;
    } else if (!filt.length) {
      h += `<div class="hint">В этот день занятий нет</div>`;
    } else {
      for (const e of filt) {
        const c = DC[e.day];
        h += `<div class="dcard" style="border-left-color:${c.a}"><div class="dct"><div class="t" style="color:${c.a}">${esc(e.time)}</div><div class="tz">МСК</div></div>`;
        h += `<div><div class="dcname"><button class="nbtn" data-idx="${e.idx}">${esc(e.child)}</button>${e.sc > 1 ? `<span class="dccnt"> — ${e.sc} уч.</span>` : ""}</div>`;
        h += `<div class="tags">${bdg(e.product)}<span class="tag tg">${esc(e.format)}</span><span class="tag tb">${esc(e.group)}</span></div>`;
        h += `<div class="teacher">👩‍🏫 ${esc(e.teacher)}${e.zoom ? `<button class="cbtn" id="cd${e.idx}" onclick="copyZoom('${e.zoom.replace(/'/g,"\\'")}','cd${e.idx}')">Zoom</button>` : ""}</div>`;
        h += `</div></div>`;
      }
    }
  }

  /* TEACHER */
  if (S.view === "teacher") {
    if (!tch.length) {
      h += `<div class="hint">Нет данных о преподавателях</div>`;
    } else {
      for (const t of tch) {
        const op = S.selT === t.t;
        h += `<div class="tblock${op ? " open" : ""}"><button class="tbtn" onclick="toggleT('${t.t.replace(/'/g,"\\'")}')"><div><div class="tname">${esc(t.t)}</div><div class="tsub">${Array.from(t.ds).join(", ")} • ${t.n} ур/нед</div></div><div class="tcnt${op ? " open" : ""}">${t.n}</div></button>`;
        if (op) {
          h += `<div class="trows">`;
          for (const e of t.ent) {
            const c = DC[e.day];
            h += `<div class="trow"><span class="trday" style="background:${c.a}30;color:${c.a}">${e.ds}</span><span class="trtime" style="color:${c.a}">${esc(e.time)}</span><span class="trchild"><button class="nbtn" data-idx="${e.idx}">${esc(e.child)}</button></span>${PB[e.product] ? `<span class="tag" style="background:${PB[e.product].bg};color:${PB[e.product].c};font-size:9px">${esc(e.product)}</span>` : ""}<span class="trgroup">${esc(e.group)}</span></div>`;
          }
          h += `</div>`;
        }
        h += `</div>`;
      }
    }
  }

  h += `<div class="stats">`;
  for (const [v, color, lbl] of [[total,"#3b82f6","Уроков/нед"],[tc,"#10b981","Преподав."],[grp,"#f59e0b","Групп"],[stu,"#a78bfa","Учеников"]]) {
    h += `<div><div class="snum" style="color:${color}">${v}</div><div class="slbl">${lbl}</div></div>`;
  }
  h += `</div><div class="footer">Авто-обновление каждые 5 мин • Google Sheets</div>`;

  app.innerHTML = h;
}

/* ─── CONTROLS ─────────────────────────────────────────────────────── */
function setView(v) { S.view = v; S.selD = null; S.selT = null; render(); }
function toggleDay(d) { S.selD = S.selD === d ? null : d; if (S.selD) S.view = "day"; S.selT = null; render(); }
function toggleT(t) { S.selT = S.selT === t ? null : t; render(); }
function clearF() { S.selD = null; S.selT = null; render(); }

/* ─── EVENT DELEGATION ─────────────────────────────────────────────── */
document.addEventListener("click", ev => {
  const btn = ev.target.closest(".nbtn");
  if (!btn) return;
  const idx = parseInt(btn.getAttribute("data-idx"), 10);
  if (!isNaN(idx)) showPopup(idx);
});

load();
setInterval(load, 300000);
</script>
