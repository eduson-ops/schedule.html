<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="refresh" content="0; url=schedule.html"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Расписание</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:16px}
button{cursor:pointer;border:none;font-family:inherit}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;font-weight:800;color:#f8fafc;margin:0}
.sub{font-size:11px;color:#64748b;margin-top:2px}
.controls{display:flex;gap:4px}
.vbtn{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;background:#1e293b;color:#94a3b8}
.vbtn.on{background:#3b82f6;color:#fff}
.rbtn{padding:5px 8px;border-radius:7px;background:#1e293b;color:#94a3b8;font-size:13px}
.daybar{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.dbtn{flex:1 0 auto;min-width:60px;padding:8px 6px;border-radius:10px;text-align:center;color:#cbd5e1;background:#1e293b;transition:all .15s}
.dbtn .ds{font-size:10px;font-weight:700;opacity:.8}
.dbtn .dn{font-size:22px;font-weight:900;line-height:1}
.fbar{display:flex;align-items:center;gap:6px;margin-bottom:12px;padding:6px 12px;background:#1e293b;border-radius:8px;font-size:12px}
.ftag{padding:2px 8px;border-radius:5px;font-weight:600;font-size:12px}
.xbtn{margin-left:auto;padding:2px 8px;border-radius:5px;background:#ef4444;color:#fff;font-size:10px;font-weight:700}
.dblock{background:#1e293b;border-radius:12px;overflow:hidden;margin-bottom:8px}
.dbhead{padding:8px 14px;display:flex;align-items:center;gap:8px}
.dbtitle{font-size:14px;font-weight:800}
.dbcnt{padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;color:#0f172a}
.lrow{display:grid;grid-template-columns:50px 1fr;align-items:center;padding:7px 12px;gap:8px;border-bottom:1px solid #334155}
.lrow:last-child{border-bottom:none}
.ltime{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}
.lname{font-size:12px;font-weight:600;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmeta{font-size:10px;color:#94a3b8;margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dcard{background:#1e293b;border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:60px 1fr;gap:12px;align-items:start;margin-bottom:6px;border-left:3px solid transparent}
.dct{text-align:center}
.dct .t{font-size:22px;font-weight:900;line-height:1}
.dct .tz{font-size:9px;color:#475569;margin-top:2px}
.dcname{font-size:14px;font-weight:700;color:#f8fafc}
.dccnt{font-size:11px;color:#94a3b8;font-weight:400}
.tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;align-items:center}
.tag{padding:1px 7px;border-radius:5px;font-size:10px;font-weight:600}
.tg{background:#374151;color:#d1d5db}
.tb{background:#1e3a5f;color:#93c5fd}
.teacher{font-size:11px;color:#94a3b8;margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tblock{background:#1e293b;border-radius:12px;overflow:hidden;border:1px solid transparent;margin-bottom:6px}
.tblock.open{border-color:#3b82f6}
.tbtn{width:100%;padding:12px 16px;background:transparent;color:#e2e8f0;text-align:left;display:flex;align-items:center;justify-content:space-between}
.tname{font-size:14px;font-weight:700}
.tsub{font-size:10px;color:#94a3b8;margin-top:1px}
.tcnt{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#334155;font-size:15px;font-weight:900;color:#94a3b8}
.tcnt.open{background:#3b82f6;color:#fff}
.trows{padding:0 16px 12px}
.trow{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid #334155}
.trday{width:26px;text-align:center;font-size:10px;font-weight:700;border-radius:3px;padding:1px 0}
.trtime{font-size:12px;font-weight:700;width:40px;font-variant-numeric:tabular-nums}
.trchild{font-size:11px;color:#e2e8f0;flex:1}
.trgroup{font-size:9px;color:#64748b}
.nbtn{background:none;border:none;cursor:pointer;color:inherit;font:inherit;font-weight:inherit;padding:0;border-bottom:1px dashed #475569;transition:all .15s;text-align:left}
.nbtn:hover{border-bottom-color:#60a5fa;color:#93c5fd}
.cbtn{padding:2px 8px;border-radius:5px;background:#1e293b;color:#94a3b8;font-size:10px;font-weight:600;border:1px solid #334155;cursor:pointer;transition:all .15s;white-space:nowrap}
.cbtn:hover{background:#334155;color:#e2e8f0}
.cbtn.ok{background:#16a34a20;color:#4ade80;border-color:#4ade8040}
.stats{margin-top:20px;padding:12px 14px;background:#1e293b;border-radius:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center}
.snum{font-size:22px;font-weight:900}
.slbl{font-size:9px;color:#64748b}
.footer{text-align:center;font-size:9px;color:#334155;margin-top:8px}
.hint{text-align:center;color:#64748b;padding:32px;font-size:13px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh}
.spinner{width:40px;height:40px;border:3px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.erbox{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px}

/* ── POPUP ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.pcard{background:#1e293b;border-radius:20px;width:100%;max-width:480px;border:1px solid #2d3a4e;box-shadow:0 24px 80px rgba(0,0,0,0.6);overflow:hidden;max-height:90vh;overflow-y:auto}
.phead{padding:20px 20px 16px;border-bottom:1px solid #2d3748;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;background:#1a2234;position:sticky;top:0;z-index:1}
.pchild{font-size:22px;font-weight:800;color:#f8fafc;margin-bottom:6px}
.ptags{display:flex;gap:5px;flex-wrap:wrap}
.pclose{width:34px;height:34px;border-radius:9px;background:#2d3748;color:#718096;border:none;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-top:2px}
.pclose:hover{background:#3d4a5c;color:#e2e8f0}
.psec{padding:16px 20px;border-bottom:1px solid #1e2d40}
.psec:last-child{border-bottom:none}
.pseclbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4a5568;margin-bottom:10px}
.prow{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:13px;color:#cbd5e1;line-height:1.5}
.prow:last-child{margin-bottom:0}
.pico{font-size:16px;width:22px;text-align:center;flex-shrink:0;margin-top:1px}
.pval{flex:1}
.plink{color:#60a5fa;text-decoration:none;border-bottom:1px dashed #3b82f640}
.plink:hover{color:#93c5fd;border-bottom-color:#93c5fd}
.pempty{color:#4a5568;font-size:12px;font-style:italic;padding:16px 20px}
.ppay{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ppay .amount{font-weight:700;color:#f8fafc}
.ppay .meta{color:#64748b;font-size:12px}
</style>
</head>
<body>
<div id="app"></div>

<!-- POPUP -->
<div id="popup-overlay" class="overlay" onclick="if(event.target===this)hidePopup()">
  <div class="pcard">
    <div class="phead">
      <div>
        <div class="pchild" id="p-name"></div>
        <div class="ptags" id="p-tags"></div>
      </div>
      <button class="pclose" onclick="hidePopup()">✕</button>
    </div>
    <div id="p-body"></div>
  </div>
</div>

<script>
const DAYS=["Понедельник","Вторник","Среда","Четверг","Пятница","Суббота","Воскресенье"];
const DS={"Понедельник":"Пн","Вторник":"Вт","Среда":"Ср","Четверг":"Чт","Пятница":"Пт","Суббота":"Сб","Воскресенье":"Вс"};
const DC={"Понедельник":{a:"#60a5fa",b:"#1e3a5f80"},"Вторник":{a:"#4ade80",b:"#1a473180"},"Среда":{a:"#fbbf24",b:"#713f1280"},"Четверг":{a:"#fb923c",b:"#7c2d1280"},"Пятница":{a:"#a78bfa",b:"#4c1d9580"},"Суббота":{a:"#34d399",b:"#064e3b80"},"Воскресенье":{a:"#f472b6",b:"#83184380"}};
const PB={"Python":{bg:"#1e40af",c:"#dbeafe"},"Scratch":{bg:"#b45309",c:"#fef3c7"}};
const BASE="https://docs.google.com/spreadsheets/d/e/2PACX-1vT25E4I1fZ4JTPFgPf6CmAUBP-AZugF_qgGTubKybfTSiZ8YiuszkTLAM_h5iFZ_8dk6NCZtZbKElbu/pub?gid=218134507&single=true&output=csv";
const PROXIES=[BASE,"https://corsproxy.io/?"+encodeURIComponent(BASE),"https://api.allorigins.win/raw?url="+encodeURIComponent(BASE)];
const dayMap={"пн":"Понедельник","понедельник":"Понедельник","вт":"Вторник","вторник":"Вторник","ср":"Среда","среда":"Среда","чт":"Четверг","четверг":"Четверг","пт":"Пятница","пятница":"Пятница","сб":"Суббота","суббота":"Суббота","вс":"Воскресенье","вск":"Воскресенье","воскресенье":"Воскресенье"};

var S={entries:[],raw:[],loading:true,err:null,dbg:"",upd:null,selD:null,selT:null,view:"week"};

function parseSched(s){
  if(!s)return[];
  var out=[],re=/(Пн|Вт|Ср|Чт|Пт|Сб|Вс|Вск|понедельник|вторник|среда|четверг|пятница|суббота|воскресенье)[а-яА-Я]*\s*(\d{1,2})[:\.](\d{2})/gi,m;
  while((m=re.exec(s))!==null)out.push({day:dayMap[m[1].toLowerCase()]||m[1],time:m[2]+":"+m[3]});
  if(!out.length){
    var df=null;
    for(var k in dayMap)if(s.toLowerCase().includes(k)){df=dayMap[k];break;}
    var tm=s.match(/(\d{1,2})[:\.](\d{2})/);
    if(df&&tm)out.push({day:df,time:tm[1]+":"+tm[2]});
  }
  return out;
}

function fc(h){
  var ks=Array.prototype.slice.call(arguments,1);
  var hl=h.map(function(x){return(x||"").toString().trim().toLowerCase();});
  for(var i=0;i<ks.length;i++){var j=hl.findIndex(function(x){return x.includes(ks[i].toLowerCase());});if(j!==-1)return j;}
  return -1;
}

function proc(text){
  var p=Papa.parse(text,{skipEmptyLines:true}),rows=p.data;
  if(!rows||rows.length<2)return{entries:[],dbg:"Нет строк"};
  var hdr=rows[0].map(function(x){return(x||"").trim();});
  var iT=fc(hdr,"Основной преподаватель","преподаватель"),iG=fc(hdr,"Группа"),iS=fc(hdr,"Время занятий");
  var iF=fc(hdr,"Формат"),iP=fc(hdr,"Продукт"),iPr=fc(hdr,"Имя родителя");
  var iCh=fc(hdr,"ФИО ребенка","Имя ребенка"),iCo=fc(hdr,"Комментарий");
  var iZ=fc(hdr,"Ссылка на занятия","Ссылка на занятие","Zoom","Ссылка на урок");
  var iA=fc(hdr,"Ссылка на AMO","AMO","Ссылка на сделку");
  var iVK=fc(hdr,"Ссылка на группу","ВК","VK","Группа VK");
  var iAge=fc(hdr,"Возраст","Дата рождения");
  var iPay=fc(hdr,"Сумма оплаты","Оплата","Сумма");
  var iPayCnt=fc(hdr,"Кол-во уроков","Количество уроков","Оплачено уроков");
  var iPayDate=fc(hdr,"Дата оплаты","Дата платежа");
  var iPack=fc(hdr,"Пакет","Тариф","Тип пакета");
  var iTg=fc(hdr,"Telegram","Тг","TG","Телеграм");
  var iEmail=fc(hdr,"Email","Почта","E-mail");
  var iPhone=fc(hdr,"Телефон","Phone","Номер телефона");
  var iPN=fc(hdr,"ФИО родителя","Имя родителя","Родитель");
  var dbg=rows.length+" строк | Преп="+(iT>=0?"✓":"✗")+" Группа="+(iG>=0?"✓":"✗")+" Расп="+(iS>=0?"✓":"✗")+" Ребёнок="+(iCh>=0?"✓":"✗");
  var entries=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];
    var child=iCh>=0?(r[iCh]||"").trim():"",parent=iPr>=0?(r[iPr]||"").trim():"";
    if(!child&&!parent)continue;
    var com=iCo>=0?(r[iCo]||"").toUpperCase():"";
    if(com.includes("ОТЧИСЛЕН")||com.includes("ВОЗВРАТ"))continue;
    var sched=iS>=0?(r[iS]||""):"",group=iG>=0?(r[iG]||""):"";
    var teacher=iT>=0?(r[iT]||"Не назначен"):"Не назначен";
    var product=iP>=0?(r[iP]||""):"",format=iF>=0?(r[iF]||""):"";
    if(!sched||!group)continue;
    var dts=parseSched(sched);
    for(var j=0;j<dts.length;j++){
      entries.push({
        day:dts[j].day,ds:DS[dts[j].day]||"?",time:dts[j].time,
        group:group.trim(),child:child||"—",parent:parent,
        teacher:teacher||"Не назначен",product:product,
        format:format.includes("Индив")?"Индив.":format.includes("Груп")?"Группа":format,
        zoom:iZ>=0?(r[iZ]||""):"",
        amo:iA>=0?(r[iA]||""):"",
        vk:iVK>=0?(r[iVK]||""):"",
        age:iAge>=0?(r[iAge]||""):"",
        pay:iPay>=0?(r[iPay]||""):"",
        payCnt:iPayCnt>=0?(r[iPayCnt]||""):"",
        payDate:iPayDate>=0?(r[iPayDate]||""):"",
        pack:iPack>=0?(r[iPack]||""):"",
        tg:iTg>=0?(r[iTg]||""):"",
        email:iEmail>=0?(r[iEmail]||""):"",
        phone:iPhone>=0?(r[iPhone]||""):"",
        parentName:iPN>=0?(r[iPN]||""):parent,
      });
    }
  }
  entries.sort(function(a,b){
    var d=DAYS.indexOf(a.day)-DAYS.indexOf(b.day);if(d)return d;
    var ta=a.time.split(":").map(Number),tb=b.time.split(":").map(Number);
    return(ta[0]*60+(ta[1]||0))-(tb[0]*60+(tb[1]||0));
  });
  return{entries:entries,dbg:dbg};
}

function dedup(entries){
  var m=new Map(),r=[];
  for(var i=0;i<entries.length;i++){
    var e=entries[i],k=e.day+"|"+e.time+"|"+e.group;
    if(m.has(k)){var x=m.get(k);var n=e.child.split(" ")[0];if(!x.child.includes(n))x.child+=", "+n;x.sc++;}
    else{var x=Object.assign({},e,{child:e.child.split(" ")[0],sc:1});m.set(k,x);r.push(x);}
  }
  return r;
}

/* ─── POPUP ─────────────────────────────────────────────────────────── */
function showPopup(idx){
  var e=S.entries[idx];
  if(!e)return;

  document.getElementById("p-name").textContent=e.child;

  var tagsEl=document.getElementById("p-tags");
  tagsEl.innerHTML="";
  if(e.product&&PB[e.product]){
    var sp=document.createElement("span");sp.className="tag";
    sp.style.background=PB[e.product].bg;sp.style.color=PB[e.product].c;
    sp.textContent=e.product;tagsEl.appendChild(sp);
  }
  if(e.format){var sp=document.createElement("span");sp.className="tag tg";sp.textContent=e.format;tagsEl.appendChild(sp);}
  if(e.group){var sp=document.createElement("span");sp.className="tag tb";sp.textContent=e.group;tagsEl.appendChild(sp);}
  if(e.teacher&&e.teacher!=="Не назначен"){var sp=document.createElement("span");sp.className="tag";sp.style.background="#1a2e1a";sp.style.color="#4ade80";sp.textContent="👩‍🏫 "+e.teacher;tagsEl.appendChild(sp);}

  var body=document.getElementById("p-body");
  body.innerHTML="";

  /* Секция: Ученик */
  var studH="";
  if(e.amo) studH+=prow("🔗","<a class='plink' href='"+e.amo+"' target='_blank'>Открыть в AMO CRM</a>");
  if(e.age) studH+=prow("🎂",e.age);
  if(e.pack) studH+=prow("📦","<strong style='color:#f8fafc'>"+e.pack+"</strong>");
  if(e.pay){
    var payH="<span class='amount'>"+e.pay+"</span>";
    if(e.payCnt) payH+=" <span class='meta'>· "+e.payCnt+" ур.</span>";
    if(e.payDate) payH+=" <span class='meta'>· "+e.payDate+"</span>";
    studH+=prow("💳","<div class='ppay'>"+payH+"</div>");
  }
  if(e.vk) studH+=prow("💬","<a class='plink' href='"+e.vk+"' target='_blank'>Группа ВКонтакте</a>");
  if(e.zoom) studH+=prow("📹","<a class='plink' href='"+e.zoom+"' target='_blank'>Ссылка на занятие</a>");
  if(studH) body.appendChild(makeSec("Ученик",studH));

  /* Секция: Родитель */
  var parH="";
  if(e.parentName) parH+=prow("👤",e.parentName);
  if(e.phone) parH+=prow("📞",e.phone);
  if(e.tg) parH+=prow("✈️",e.tg);
  if(e.email) parH+=prow("📧",e.email);
  if(parH) body.appendChild(makeSec("Родитель",parH));

  if(!studH&&!parH){
    var d=document.createElement("div");d.className="pempty";d.textContent="Дополнительных данных нет";body.appendChild(d);
  }

  document.getElementById("popup-overlay").classList.add("show");
}

function prow(ico,html){return "<div class='prow'><span class='pico'>"+ico+"</span><span class='pval'>"+html+"</span></div>";}

function makeSec(label,html){
  var d=document.createElement("div");d.className="psec";
  d.innerHTML="<div class='pseclbl'>"+label+"</div>"+html;
  return d;
}

function hidePopup(){document.getElementById("popup-overlay").classList.remove("show");}
document.addEventListener("keydown",function(e){if(e.key==="Escape")hidePopup();});

/* ─── COPY ─────────────────────────────────────────────────────────── */
function copyZoom(url,bid){
  if(!url){alert("Ссылка не указана");return;}
  var done=function(){
    var btn=document.getElementById(bid);
    if(btn){btn.textContent="✓ Скопировано";btn.classList.add("ok");setTimeout(function(){btn.textContent="🔗 Скопировать";btn.classList.remove("ok");},2000);}
  };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(function(){
      var t=document.createElement("textarea");t.value=url;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);done();
    });
  } else {
    var t=document.createElement("textarea");t.value=url;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);done();
  }
}

/* ─── LOAD ─────────────────────────────────────────────────────────── */
async function load(){
  S.loading=true;S.err=null;render();
  for(var i=0;i<PROXIES.length;i++){
    try{
      var res=await fetch(PROXIES[i]);if(!res.ok)continue;
      var text=await res.text();if(!text||text.length<50)continue;
      var out=proc(text);
      if(out.entries.length>0){
        S.raw=out.entries;S.entries=dedup(out.entries);S.dbg=out.dbg;S.upd=new Date();S.err=null;S.loading=false;render();return;
      } else{S.dbg=out.dbg;}
    }catch(ex){continue;}
  }
  S.err="Не удалось загрузить. Убедись что таблица опубликована — лист «Реестр учеников»";
  S.loading=false;render();
}

/* ─── HELPERS ──────────────────────────────────────────────────────── */
function filtered(){var d=S.entries;if(S.selD)d=d.filter(function(e){return e.day===S.selD;});if(S.selT)d=d.filter(function(e){return e.teacher===S.selT;});return d;}
function dSum(){return DAYS.map(function(d){return{d:d,s:DS[d],n:S.entries.filter(function(e){return e.day===d;}).length};});}
function teachers(){
  var m={};
  S.entries.forEach(function(e){if(!m[e.teacher])m[e.teacher]={t:e.teacher,n:0,ds:new Set(),ent:[]};m[e.teacher].n++;m[e.teacher].ds.add(e.ds);m[e.teacher].ent.push(e);});
  return Object.values(m).sort(function(a,b){return b.n-a.n;});
}
function bdg(product){
  if(!product||!PB[product])return"";
  return"<span class='tag' style='background:"+PB[product].bg+";color:"+PB[product].c+"'>"+product+"</span>";
}

/* ─── RENDER ───────────────────────────────────────────────────────── */
function render(){
  var app=document.getElementById("app");
  if(S.loading&&!S.entries.length){
    app.innerHTML="<div class='loading'><div class='spinner'></div><p style='margin-top:14px;color:#94a3b8;font-size:13px'>Загрузка из Google Sheets...</p></div>";return;
  }
  if(S.err&&!S.entries.length){
    app.innerHTML="<div class='erbox'><div style='font-size:40px;margin-bottom:12px'>⚠️</div><p style='color:#f87171;font-size:14px;max-width:420px'>"+S.err+"</p><p style='color:#475569;font-size:10px;max-width:500px;margin-top:8px;word-break:break-all'>"+S.dbg+"</p><button onclick='load()' style='margin-top:16px;padding:8px 24px;border-radius:8px;background:#3b82f6;color:#fff;font-weight:600'>Повторить</button></div>";return;
  }

  var filt=filtered(),ds=dSum(),tch=teachers();
  var total=S.entries.length,grp=new Set(S.entries.map(function(e){return e.group;})).size;
  var tc=tch.filter(function(t){return t.t!=="Не назначен";}).length,stu=S.raw.length;
  var upd=S.upd?S.upd.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}):"—";

  var h="<div class='header'><div><h1>📅 Расписание</h1><div class='sub'>Live • "+upd+(S.loading?" <span style='color:#fbbf24'>⟳</span>":"")+"</div></div><div class='controls'>";
  [["week","Неделя"],["day","Дни"],["teacher","Препод."]].forEach(function(vl){h+="<button class='vbtn"+(S.view===vl[0]?" on":"")+"' onclick=\"setView('"+vl[0]+"')\">"+vl[1]+"</button>";});
  h+="<button class='rbtn' onclick='load()'>🔄</button></div></div>";

  h+="<div class='daybar'>";
  ds.forEach(function(d){
    var c=DC[d.d],sel=S.selD===d.d;
    h+="<button class='dbtn' onclick=\"toggleDay('"+d.d+"')\" style='background:"+(sel?c.a:"#1e293b")+";color:"+(sel?"#0f172a":"#cbd5e1")+";box-shadow:"+(sel?"0 2px 12px "+c.a+"40":"none")+"'><div class='ds'>"+d.s+"</div><div class='dn'>"+d.n+"</div></button>";
  });
  h+="</div>";

  if(S.selD||S.selT){
    h+="<div class='fbar'><span style='color:#64748b'>Фильтр:</span>";
    if(S.selD){var c=DC[S.selD];h+="<span class='ftag' style='background:"+c.a+"30;color:"+c.a+"'>"+S.selD+"</span>";}
    if(S.selT)h+="<span class='ftag' style='background:#3b82f620;color:#60a5fa'>"+S.selT+"</span>";
    h+="<button class='xbtn' onclick='clearF()'>✕</button></div>";
  }

  /* WEEK */
  if(S.view==="week"){
    DAYS.forEach(function(day){
      var ent=filt.filter(function(e){return e.day===day;});if(!ent.length)return;
      var c=DC[day];
      h+="<div class='dblock' style='border-left:3px solid "+c.a+"'><div class='dbhead' style='background:"+c.b+"'><span class='dbtitle' style='color:"+c.a+"'>"+day+"</span><span class='dbcnt' style='background:"+c.a+"'>"+ent.length+"</span></div>";
      ent.forEach(function(e,i){
        var idx=S.entries.indexOf(e);
        h+="<div class='lrow' style='"+(i===ent.length-1?"border-bottom:none":"")+"'>";
        h+="<span class='ltime' style='color:"+c.a+"'>"+e.time+"</span>";
        h+="<div><div class='lname'><button class='nbtn' data-idx='"+idx+"'>"+e.child+"</button>"+(e.sc>1?"<span style='color:#64748b;font-weight:400'> ("+e.sc+")</span>":"")+bdg(e.product)+"</div>";
        h+="<div class='lmeta'>"+e.group+" • "+e.teacher+" • "+e.format+(e.zoom?"<button class='cbtn' id='cw"+idx+"' onclick=\"copyZoom('"+e.zoom.replace(/'/g,"\\'")+"','cw"+idx+"')\">🔗 Скопировать</button>":"")+"</div></div></div>";
      });
      h+="</div>";
    });
  }

  /* DAY */
  if(S.view==="day"){
    if(!S.selD){h+="<div class='hint'>Нажми на день ☝️</div>";}
    else{
      filt.forEach(function(e){
        var idx=S.entries.indexOf(e),c=DC[e.day];
        h+="<div class='dcard' style='border-left-color:"+c.a+"'><div class='dct'><div class='t' style='color:"+c.a+"'>"+e.time+"</div><div class='tz'>МСК</div></div>";
        h+="<div><div class='dcname'><button class='nbtn' data-idx='"+idx+"'>"+e.child+"</button>"+(e.sc>1?"<span class='dccnt'> — "+e.sc+" уч.</span>":"")+"</div>";
        h+="<div class='tags'>"+bdg(e.product)+"<span class='tag tg'>"+e.format+"</span><span class='tag tb'>"+e.group+"</span></div>";
        h+="<div class='teacher'>👩‍🏫 "+e.teacher+(e.zoom?"<button class='cbtn' id='cd"+idx+"' onclick=\"copyZoom('"+e.zoom.replace(/'/g,"\\'")+"','cd"+idx+"')\">🔗 Скопировать</button>":"")+"</div>";
        h+="</div></div>";
      });
    }
  }

  /* TEACHER */
  if(S.view==="teacher"){
    tch.forEach(function(t){
      var op=S.selT===t.t;
      h+="<div class='tblock"+(op?" open":"")+"'><button class='tbtn' onclick=\"toggleT('"+t.t.replace(/'/g,"\\'")+"')\"><div><div class='tname'>"+t.t+"</div><div class='tsub'>"+(Array.from?Array.from(t.ds):[...t.ds]).join(", ")+" • "+t.n+" ур/нед</div></div><div class='tcnt"+(op?" open":"")+"'>"+t.n+"</div></button>";
      if(op){
        h+="<div class='trows'>";
        t.ent.forEach(function(e){
          var idx=S.entries.indexOf(e),c=DC[e.day];
          h+="<div class='trow'><span class='trday' style='background:"+c.a+"30;color:"+c.a+"'>"+e.ds+"</span><span class='trtime' style='color:"+c.a+"'>"+e.time+"</span><span class='trchild'><button class='nbtn' data-idx='"+idx+"'>"+e.child+"</button></span>"+(PB[e.product]?"<span class='tag' style='background:"+PB[e.product].bg+";color:"+PB[e.product].c+";font-size:9px'>"+e.product+"</span>":"")+"<span class='trgroup'>"+e.group+"</span></div>";
        });
        h+="</div>";
      }
      h+="</div>";
    });
  }

  h+="<div class='stats'>";
  [[total,"#3b82f6","Уроков/нед"],[tc,"#10b981","Преподав."],[grp,"#f59e0b","Групп"],[stu,"#a78bfa","Учеников"]].forEach(function(v){
    h+="<div><div class='snum' style='color:"+v[1]+"'>"+v[0]+"</div><div class='slbl'>"+v[2]+"</div></div>";
  });
  h+="</div><div class='footer'>Авто-обновление каждые 5 мин • Google Sheets</div>";

  app.innerHTML=h;
}

/* ─── CONTROLS ─────────────────────────────────────────────────────── */
function setView(v){S.view=v;S.selD=null;S.selT=null;render();}
function toggleDay(d){S.selD=S.selD===d?null:d;if(S.selD)S.view="day";S.selT=null;render();}
function toggleT(t){S.selT=S.selT===t?null:t;render();}
function clearF(){S.selD=null;S.selT=null;render();}

/* ─── EVENT DELEGATION ─────────────────────────────────────────────── */
document.addEventListener("click",function(ev){
  var btn=ev.target.closest(".nbtn");
  if(!btn)return;
  var idx=parseInt(btn.getAttribute("data-idx"),10);
  if(!isNaN(idx))showPopup(idx);
});

load();
setInterval(load,300000);
</script>
</body>
</html>
